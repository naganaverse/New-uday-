<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajputana Vastra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f8f5f2;
  color: #333;
}

/* HEADER */
header {
  background: #7a1f1f;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-size: 22px;
  font-weight: 600;
}

/* HERO */
.hero {
  background: url("https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf") center/cover;
  height: 400px;
  display: flex;
  align-items: center;
  padding: 40px;
  color: white;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  margin-top: 10px;
}

.hero button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #b33;
  border: none;
  color: white;
  cursor: pointer;
}

/* STORES */
.stores {
  padding: 40px;
}

.stores h2 {
  text-align: center;
  margin-bottom: 30px;
}

.cards {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  width: 300px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-body {
  padding: 15px;
}

.card-body h3 {
  margin-bottom: 5px;
}

.card-body p {
  font-size: 14px;
  color: #666;
}

.card-body button {
  margin-top: 10px;
  padding: 8px 15px;
  background: #7a1f1f;
  color: white;
  border: none;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
}
</style>

</head>

<body>

<header>
  <div class="logo">Rajputana Vastra</div>
  <div>Jaipur Stores</div>
</header>

<section class="hero">
  <div>
    <h1>Celebrate Royalty</h1>
    <p>Authentic Rajputi Dresses from Jaipur</p>
    <button>Explore Stores</button>
  </div>
</section>

<section class="stores">
  <h2>Featured Stores</h2>

  <div class="cards">

    <!-- STORE 1 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1593030761757-71fae45fa0e7">
      <div class="card-body">
        <h3>Ratan Fashions</h3>
        <p>Jaipur, Rajasthan</p>
        <button>View Store</button>
      </div>
    </div>

    <!-- STORE 2 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1583394838336-acd977736f90">
      <div class="card-body">
        <h3>Rakhi Rajputi Dress</h3>
        <p>Jaipur, Rajasthan</p>
        <button>View Store</button>
      </div>
    </div>

    <!-- STORE 3 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1610030469983-98e550d6193c">
      <div class="card-body">
        <h3>Suman Rajputi Poshak</h3>
        <p>Jaipur, Rajasthan</p>
        <button>View Store</button>
      </div>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Rajputana Vastra | Made in India</p>
</footer>

</body>
</html>
